services:
  - type: web
    name: hackops-backend
    runtime: node
    plan: free
    buildCommand: chmod +x ../render-build.sh && ../render-build.sh
    startCommand: cd backend && node server.js
    rootDir: backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
